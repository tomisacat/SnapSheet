name: Bug Report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: The sheet does not snap to the expected detent when…
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Create a BackgroundSheetScene with…
        2. Drag the sheet handle down…
        3. See incorrect snap behavior
    validations:
      required: true

  - type: input
    id: ios-version
    attributes:
      label: iOS version
      placeholder: "18.2"
    validations:
      required: true

  - type: input
    id: xcode-version
    attributes:
      label: Xcode version
      placeholder: "16.2"
    validations:
      required: false

  - type: input
    id: snapsheet-version
    attributes:
      label: SnapSheet version or commit
      placeholder: "main @ abc1234"
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - BackgroundSheetScene
        - DraggableSheet
        - SheetStateModel / snapping
        - Scroll handoff / gestures
        - SheetStyle / appearance
        - Demo app
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Add console output, screen recordings, or screenshots if available.
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this report
          required: true
